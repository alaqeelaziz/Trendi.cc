<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Trends — trendi.cc</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#05111f;--bg2:#0a1a2e;--bg3:#0d2040;--card:#0f2347;--card2:#132b55;--border:#1a3560;--green:#6DC328;--blue:#1e88e5;--blue2:#1565C0;--red:#ef4444;--amber:#f5c518;--text:#e8f4fd;--text2:#90b8d8;--text3:#5a82a8;--font:'IBM Plex Sans Arabic',sans-serif;--mono:'JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;overflow-x:hidden}
body.light{--bg:#f0f6ff;--bg2:#fff;--bg3:#e8f2ff;--card:#fff;--card2:#e1eeff;--border:#b8d4f0;--text:#0a1a2e;--text2:#1a4070;--text3:#5a82a8}

/* HEADER */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:36px;width:36px;object-fit:contain;border-radius:6px}
.logo-text{display:flex;flex-direction:column;line-height:1.1}
.logo-text .brand{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--blue)}.logo-text .brand span{color:var(--green)}
.logo-text .sub{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(109,195,40,.1);border:1px solid rgba(109,195,40,.3);color:var(--green);padding:4px 10px;border-radius:20px;font-size:11px;font-family:var(--mono)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lang-sel{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:5px 8px;border-radius:8px;font-size:12px;font-family:var(--font);outline:none;cursor:pointer}
#theme-btn{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:5px 9px;border-radius:8px;cursor:pointer;font-size:14px}

/* TICKERS */
.ticker-bar{border-bottom:1px solid var(--border);overflow:hidden;height:30px;display:flex;align-items:stretch}
.ticker-label{flex-shrink:0;display:flex;align-items:center;padding:0 14px;font-family:var(--mono);font-size:10px;font-weight:700;color:#fff;z-index:2;letter-spacing:.5px}
.stocks-bar{background:#071828}.stocks-bar .ticker-label{background:var(--blue2)}
.crypto-bar{background:#091420}.crypto-bar .ticker-label{background:var(--green)}
.ticker-scroll{flex:1;overflow:hidden;display:flex;align-items:center;position:relative}
.ticker-track{display:flex;gap:36px;white-space:nowrap;width:max-content;animation:scroll-r 55s linear infinite}
.crypto-bar .ticker-track{animation-duration:45s}
@keyframes scroll-r{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11.5px;color:var(--text2)}
.stocks-bar .ti .sym{color:#7ec8f7;font-weight:600}
.crypto-bar .ti .sym{color:#a8f060;font-weight:600}
.ti .up{color:var(--green)}.ti .dn{color:var(--red)}

/* NAV */
.nav-tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:2px;padding:0 16px;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.tab-btn{background:none;border:none;color:var(--text3);padding:13px 14px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:5px}
.tab-btn:hover{color:var(--text2)}.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}

/* MAIN */
main{padding:22px;max-width:1400px;margin:0 auto}
.tab-pane{display:none;animation:fadeIn .25s ease}.tab-pane.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.sec-title{font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:4px;height:20px;background:linear-gradient(to bottom,var(--green),var(--blue));border-radius:2px}
.refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:var(--font);font-size:12px;transition:all .2s;display:flex;align-items:center;gap:5px}
.refresh-btn:hover{border-color:var(--green);color:var(--green)}
.refresh-btn.spinning svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* GRIDS */
.grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:13px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px}

/* PRICE CARD */
.price-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px;transition:all .2s;position:relative;overflow:hidden}
.price-card::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%}
.price-card.green::before{background:linear-gradient(to bottom,var(--green),transparent)}
.price-card.red::before{background:linear-gradient(to bottom,var(--red),transparent)}
.price-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(109,195,40,.1)}
.card-label{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.card-name{font-size:13px;color:var(--text2);margin-bottom:9px;font-weight:500}
.card-price{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--text);margin-bottom:5px}
.card-change{font-family:var(--mono);font-size:12px;display:flex;align-items:center;gap:3px}
.card-change.up{color:var(--green)}.card-change.dn{color:var(--red)}
.card-unit{font-size:10px;color:var(--text3);margin-top:4px}

/* NEWS */
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.news-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px;transition:all .3s;cursor:pointer}
.news-card:hover,.news-card.expanded{border-color:var(--green);transform:translateY(-1px);box-shadow:0 4px 20px rgba(109,195,40,.1)}
.news-card.expanded{transform:none}
.news-source{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.news-title{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:8px}
.news-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.news-meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text3);font-family:var(--mono)}
.news-tag{background:rgba(109,195,40,.1);border:1px solid rgba(109,195,40,.2);color:var(--green);padding:2px 8px;border-radius:10px;font-size:10px}
.read-more{display:none;margin-top:10px;color:var(--green);font-size:12px;font-family:var(--mono);text-decoration:none}
.news-card.expanded .read-more{display:inline-flex;align-items:center;gap:4px}

/* DEAL CARD */
.deal-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px;transition:all .2s}
.deal-card:hover{border-color:var(--amber);transform:translateY(-2px)}
.deal-type{font-size:10px;font-family:var(--mono);text-transform:uppercase;padding:3px 8px;border-radius:10px;display:inline-block;margin-bottom:9px}
.deal-type.tech{background:rgba(30,136,229,.15);color:var(--blue);border:1px solid rgba(30,136,229,.3)}
.deal-type.finance{background:rgba(109,195,40,.1);color:var(--green);border:1px solid rgba(109,195,40,.2)}
.deal-type.crypto{background:rgba(168,85,247,.1);color:#a855f7;border:1px solid rgba(168,85,247,.2)}
.deal-type.stocks{background:rgba(245,197,24,.1);color:var(--amber);border:1px solid rgba(245,197,24,.2)}
.deal-title{font-size:14px;font-weight:600;margin-bottom:5px}
.deal-value{font-family:var(--mono);font-size:18px;color:var(--amber);font-weight:600;margin-bottom:6px}
.deal-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.deal-date{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* FOREX */
.forex-wrap{display:grid;grid-template-columns:1fr 320px;gap:18px}
@media(max-width:900px){.forex-wrap{grid-template-columns:1fr}}
.converter{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;position:sticky;top:80px}
.conv-title{font-size:15px;font-weight:600;margin-bottom:18px}
.form-group{margin-bottom:13px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
.form-input,.form-select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:16px;padding:9px 13px;border-radius:8px;outline:none;transition:border-color .2s}
.form-input:focus,.form-select:focus{border-color:var(--green)}
.form-select option{background:var(--bg3)}
.conv-btn{width:100%;background:linear-gradient(135deg,var(--green),#5aaa1f);border:none;color:#0a0e1a;font-weight:700;padding:12px;border-radius:10px;cursor:pointer;font-family:var(--font);font-size:14px;margin-top:4px;transition:all .2s}
.conv-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(109,195,40,.3)}
.conv-result{margin-top:14px;background:var(--bg3);border:1px solid var(--green);border-radius:10px;padding:14px;text-align:center;display:none}
.conv-result.show{display:block}
.conv-result-main{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--green)}
.conv-result-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* CALC */
.calc-wrap{max-width:640px;margin:0 auto}
.calc-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.calc-tabs{display:flex;border-bottom:1px solid var(--border)}
.calc-tab{flex:1;padding:13px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--text3);border:none;background:none;font-family:var(--font);transition:all .2s}
.calc-tab.active{color:var(--green);background:rgba(109,195,40,.05)}
.calc-body{padding:24px}
.calc-result{margin-top:18px;background:linear-gradient(135deg,rgba(109,195,40,.1),rgba(30,136,229,.05));border:1px solid rgba(109,195,40,.2);border-radius:11px;padding:20px;text-align:center;display:none}
.calc-result.show{display:block}
.result-label{font-size:12px;color:var(--text3);margin-bottom:5px}
.result-value{font-family:var(--mono);font-size:30px;font-weight:600;color:var(--green)}
.result-savings{font-size:13px;color:var(--amber);margin-top:7px}

/* MARKET GROUPS */
.market-group{margin-bottom:22px}
.market-group-title{font-size:12px;color:var(--text3);margin-bottom:11px;letter-spacing:.3px}

footer{border-top:1px solid var(--border);background:var(--bg2);padding:14px 20px;text-align:center;font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:40px}
@media(max-width:600px){header{padding:0 12px}main{padding:14px 10px}.grid-4,.grid-3{grid-template-columns:1fr}}
</style>
</head>

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function L() { return I18N[lang] || I18N.ar; }
function fmt(n,d) {
  d = d===undefined?2:d;
  if(n===null||n===undefined||isNaN(n)) return '--';
  var x=parseFloat(n);
  if(x>=1e12) return (x/1e12).toFixed(2)+'T';
  if(x>=1e9)  return (x/1e9).toFixed(2)+'B';
  if(x>=1e6)  return (x/1e6).toFixed(2)+'M';
  return x.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function pcard(chg,sym,name,price,priceStr,unit,extra) {
  var cls=chg>=0?'green':'red', arr=chg>=0?'▲':'▼';
  return '<div class="price-card '+cls+'">'+(extra||'')+
    '<div class="card-label">'+sym+'</div>'+
    '<div class="card-name">'+name+'</div>'+
    '<div class="card-price">'+priceStr+'</div>'+
    '<div class="card-change '+(chg>=0?'up':'dn')+'">'+arr+' '+Math.abs(chg).toFixed(2)+'%</div>'+
    '<div class="card-unit">'+unit+'</div></div>';
}
function secHeader(title, tabId) {
  return '<div class="sec-header"><div class="sec-title">'+title+'</div>'+
    '<button class="refresh-btn" onclick="reloadTab(''+tabId+'')">'+
    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>'+
    ' '+L().refresh+'</button></div>';
}

// ═══════════════════════════════════════════
// TICKERS
// ═══════════════════════════════════════════
function buildTickers() {
  var st = document.getElementById('stocks-track');
  var ct = document.getElementById('crypto-track');
  if(!st||!ct) return;
  var sHtml='', cHtml='';
  // Double for seamless loop
  [0,1].forEach(function() {
    D.stocks.forEach(function(s) {
      var cl = s.c>=0?'up':'dn';
      sHtml += '<span class="ti"><span class="flag">'+s.flag+'</span><span class="sym">'+s.s+'</span><span class="'+cl+'">'+fmt(s.p,s.p>1000?0:2)+' ('+(s.c>=0?'+':'')+s.c.toFixed(2)+'%)</span></span>';
    });
    D.crypto.forEach(function(c) {
      var cl = c.c>=0?'up':'dn', ps=c.p>=1?'$'+fmt(c.p,2):'$'+fmt(c.p,4);
      cHtml += '<span class="ti"><span class="sym">'+c.s+'</span><span class="'+cl+'">'+ps+' ('+(c.c>=0?'+':'')+c.c.toFixed(2)+'%)</span></span>';
    });
  });
  st.innerHTML = sHtml;
  ct.innerHTML = cHtml;
  // Try live crypto update
  setTimeout(function() {
    fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,ripple,binancecoin,dogecoin&vs_currencies=usd&include_24hr_change=true')
      .then(function(r){return r.json();})
      .then(function(d) {
        var map={bitcoin:'BTC',ethereum:'ETH',solana:'SOL',ripple:'XRP',binancecoin:'BNB',dogecoin:'DOGE'};
        Object.entries(d).forEach(function(e) {
          var sym=map[e[0]], v=e[1]; if(!sym||!v) return;
          D.crypto.forEach(function(c) {
            if(c.s===sym){c.p=v.usd;c.c=v.usd_24h_change||c.c;}
          });
        });
        buildTickers();
      }).catch(function(){});
  }, 2000);
}

// NAV

var TABS = [
  {id:'eco',icon:'📰'},{id:'metals',icon:'🥇'},{id:'stocks',icon:'📈'},
  {id:'crypto',icon:'₿'},{id:'oil',icon:'🛢️'},{id:'forex',icon:'💱'},
  {id:'tech',icon:'💻'},{id:'deals',icon:'🤝'},{id:'calc',icon:'🏷️'}
];
function buildNav() {
  var nav=document.getElementById('nav-tabs');
  if(!nav) return;
  nav.innerHTML = TABS.map(function(t,i) {
    return '<button class="tab-btn'+(t.id===activeTab?' active':'')+'" id="btn-'+t.id+'" onclick="switchTab(''+t.id+'')">'+t.icon+' '+L().tabs[i]+'</button>';
  }).join('');
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  var pane=document.getElementById('pane-'+id);
  var btn=document.getElementById('btn-'+id);
  if(pane) pane.classList.add('active');
  if(btn) btn.classList.add('active');
  if(!loadedTabs2[id]) { renderTab(id); loadedTabs2[id]=true; }
}
function reloadTab(id) {
  loadedTabs2[id]=false;
  renderTab(id);
  loadedTabs2[id]=true;
}
function renderTab(id) {
  var map={eco:renderEco,metals:renderMetals,stocks:renderStocks,crypto:renderCrypto,
           oil:renderOil,forex:renderForex,tech:renderTech,deals:renderDeals,calc:renderCalc};
  if(map[id]) map[id]();
}

function renderNewsCards(news) {
  return '<div class="news-grid">'+news.map(function(n,i) {
    var tid=L().tags[n.tag]||n.tag;
    var uid='nc'+i+Math.random().toString(36).substr(2,5);
    return '<div class="news-card" id="'+uid+'" onclick="toggleNews(''+uid+'')">'+
      '<div class="news-source" style="color:'+n.clr+'">'+n.src+'</div>'+
      '<div class="news-title">'+n.t+'</div>'+
      '<div class="news-desc">'+n.d.substring(0,130)+'...</div>'+
      '<div style="display:none" class="news-full-desc">'+n.d+'</div>'+
      '<a class="read-more" href="#" onclick="return false">'+L().readMore+'</a>'+
      '<div class="news-meta"><span>Now</span><span class="news-tag">'+tid+'</span></div>'+
    '</div>';
  }).join('')+'</div>';
}
function toggleNews(uid) {
  var c=document.getElementById(uid); if(!c) return;
  var isOpen=c.classList.contains('expanded');
  document.querySelectorAll('.news-card.expanded').forEach(function(x){
    x.classList.remove('expanded');
    var fd=x.querySelector('.news-full-desc');
    var sd=x.querySelector('.news-desc');
    if(fd)fd.style.display='none'; if(sd)sd.style.display='block';
  });
  if(!isOpen){
    c.classList.add('expanded');
    var fd2=c.querySelector('.news-full-desc');
    var sd2=c.querySelector('.news-desc');
    if(fd2)fd2.style.display='block'; if(sd2)sd2.style.display='none';
    c.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}
function renderMetals() {
  var p=document.getElementById('pane-metals');
  if(!p) return;
  var h=secHeader(L().secT[1],'metals')+'<div class="grid-4">';
  D.metals.forEach(function(m) {
    var n=L().metals[m.k]||m.k, u=(['copper','nickel','zinc'].indexOf(m.k)>=0)?L().lb:L().oz;
    h+=pcard(m.c,m.s,n,'$'+fmt(m.p,m.p>100?2:4),('$'+fmt(m.p,m.p>100?2:4)),u);
  });
  p.innerHTML=h+'</div>';
  fetch('https://api.metals.live/v1/spot').then(function(r){return r.json();}).then(function(d){
    if(!Array.isArray(d)||d.length<4) return;
    var map={gold:'XAU',silver:'XAG',platinum:'XPT',palladium:'XPD',copper:'HG',rhodium:'RHO',nickel:'NI',zinc:'ZN'};
    d.forEach(function(m) {
      var k=m.metal&&m.metal.toLowerCase(), p2=parseFloat(m.price);
      if(!k||!p2) return;
      D.metals.forEach(function(dm){if(dm.k===k){dm.p=p2;dm.c=parseFloat(m.change||dm.c);}});
    });
    if(!loadedTabs2.metals) return;
    renderMetals();
  }).catch(function(){});
}
function renderStocks() {
  var p=document.getElementById('pane-stocks');
  if(!p) return;
  var us=D.stocks.filter(function(s){return s.flag==='🇺🇸';});
  var sa=D.stocks.filter(function(s){return s.flag==='🇸🇦';});
  var gl=D.stocks.filter(function(s){return s.flag!=='🇺🇸'&&s.flag!=='🇸🇦';});
  function grp(title,arr) {
    return '<div class="market-group"><div class="market-group-title">'+title+'</div><div class="grid-4">'+
      arr.map(function(s){return pcard(s.c,s.s,s.s,fmt(s.p,s.p>1000?0:2),fmt(s.p,s.p>1000?0:2),'pts');}).join('')+'</div></div>';
  }
  p.innerHTML=secHeader(L().secT[2],'stocks')+grp(L().usM,us)+grp(L().saM,sa)+grp(L().glM,gl);
  // Live update via allorigins
  var syms=D.stocks.filter(function(s){return s.sym.startsWith('^');}).map(function(s){return s.sym;}).join(',');
  fetch('https://api.allorigins.win/get?url='+encodeURIComponent('https://query1.finance.yahoo.com/v7/finance/quote?symbols='+encodeURIComponent(syms)+'&fields=regularMarketPrice,regularMarketChangePercent'))
    .then(function(r){return r.json();}).then(function(outer) {
      var d=JSON.parse(outer.contents);
      ((d&&d.quoteResponse&&d.quoteResponse.result)||[]).forEach(function(q) {
        D.stocks.forEach(function(s){if(s.sym===q.symbol){s.p=q.regularMarketPrice;s.c=q.regularMarketChangePercent;}});
      });
      if(loadedTabs2.stocks) renderStocks();

      fxRates=d.rates;
      D.forex.forEach(function(f){if(d.rates[f.c])f.r=d.rates[f.c];});

function doConvert() {
  var amt=parseFloat(document.getElementById('fx-amt').value)||0;
  var fr=document.getElementById('fx-from').value;
  var to=document.getElementById('fx-to').value;
  var r1=fxRates[fr]||1, r2=fxRates[to]||1;
  var res=amt*(r2/r1);
  var el=document.getElementById('conv-res');
  var ev=document.getElementById('conv-val');
  var es=document.getElementById('conv-sub');
  if(el)el.classList.add('show');
  if(ev)ev.textContent=fmt(res,4)+' '+to;
  if(es)es.textContent=amt+' '+fr+' = '+fmt(res,4)+' '+to;
}

function swCalc(m) {
  document.getElementById('cbA').style.display=m==='A'?'block':'none';
  document.getElementById('cbB').style.display=m==='B'?'block':'none';
  document.getElementById('ctA').className='calc-tab'+(m==='A'?' active':'');
  document.getElementById('ctB').className='calc-tab'+(m==='B'?' active':'');
}
function calcA() {
  var op=parseFloat(document.getElementById('cOP').value)||0;
  var dp=parseFloat(document.getElementById('cDP').value)||0;
  if(!op||dp<0||dp>100){document.getElementById('rA').classList.remove('show');return;}
  var after=op*(1-dp/100), save=op-after;
  document.getElementById('rA').classList.add('show');
  document.getElementById('rAV').textContent=fmt(after,2);
  document.getElementById('rAS').textContent=L().save(fmt(save,2),dp);
}
function calcB() {
  var sp=parseFloat(document.getElementById('cSP').value)||0;
  var ap=parseFloat(document.getElementById('cAP').value)||0;
  if(!sp||ap<=0||ap>=100){document.getElementById('rB').classList.remove('show');return;}
  var orig=sp/(1-ap/100), save=orig-sp;
  document.getElementById('rB').classList.add('show');
  document.getElementById('rBV').textContent=fmt(orig,2);
  document.getElementById('rBS').textContent=L().discV(fmt(save,2),ap);
}

// LIVE NEWS (background RSS)
// ═══════════════════════════════════════════
function loadLiveEco() {
  var feeds=['https://feeds.marketwatch.com/marketwatch/topstories/','https://www.cnbc.com/id/20910258/device/rss/rss.html'];
  var base='https://api.rss2json.com/v1/api.json?rss_url=';
  var items=[];
  var done=0;
  feeds.forEach(function(url) {
    fetch(base+encodeURIComponent(url)+'&count=6').then(function(r){return r.json();}).then(function(d){
      if(d.items&&d.items.length) items=items.concat(d.items.slice(0,6));
      done++;
      if(done===feeds.length&&items.length>=4) {
        var mapped=items.slice(0,12).map(function(i){
          return {src:i.author||'News',clr:'#2196F3',tag:'mkt',t:i.title||'',d:(i.description||'').replace(/<[^>]+>/g,'').substring(0,400)};
        });
        var p=document.getElementById('pane-eco');
        if(p&&loadedTabs2.eco) p.innerHTML=secHeader(L().secT[0],'eco')+renderNewsCards(mapped);
      }
    }).catch(function(){done++;});
  });
}
function loadLiveTech() {
  var feeds=['https://techcrunch.com/feed/','https://www.theverge.com/rss/index.xml'];
  var base='https://api.rss2json.com/v1/api.json?rss_url=';
  var items=[];
  var done=0;
  feeds.forEach(function(url,i) {
    var srcName=i===0?'TechCrunch':'The Verge', srcClr=i===0?'#6DC328':'#1e88e5';
    fetch(base+encodeURIComponent(url)+'&count=6').then(function(r){return r.json();}).then(function(d){
      if(d.items&&d.items.length) items=items.concat(d.items.slice(0,6).map(function(x){return Object.assign({},x,{_src:srcName,_clr:srcClr});}));
      done++;
      if(done===feeds.length&&items.length>=4) {
        var mapped=items.slice(0,12).map(function(i2){
          return {src:i2._src,clr:i2._clr,tag:'tech',t:i2.title||'',d:(i2.description||'').replace(/<[^>]+>/g,'').substring(0,400)};
        });
        var p=document.getElementById('pane-tech');
        if(p&&loadedTabs2.tech) p.innerHTML=secHeader(L().secT[6],'tech')+renderNewsCards(mapped);
      }
    }).catch(function(){done++;});
  });
}

function setLang(l) {
  lang=l;
  localStorage.setItem('t-lang',l);
  document.documentElement.lang=l;
  document.documentElement.dir=I18N[l]?I18N[l].dir:'rtl';
  document.body.style.direction=I18N[l]?I18N[l].dir:'rtl';
  // Update ticker labels
  var ls=document.getElementById('lbl-stocks'), lc=document.getElementById('lbl-crypto');
  if(ls)ls.textContent=L().lbl_s; if(lc)lc.textContent=L().lbl_c;
  // Update live badge
  var ll=document.getElementById('live-lbl'); if(ll)ll.textContent=L().live;
  // Footer
  var ft=document.getElementById('footer-txt'); if(ft)ft.textContent=L().footer;
  // Rebuild nav
  buildNav();
  // Re-render all loaded tabs
  Object.keys(loadedTabs2).forEach(function(id){if(loadedTabs2[id])renderTab(id);});
  // Select sync
  var sel=document.getElementById('lang-sel'); if(sel)sel.value=l;
}

// ═══════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════
function toggleTheme() {
  document.body.classList.toggle('light');
  document.getElementById('theme-btn').textContent=document.body.classList.contains('light')?'🌙':'☀️';
  localStorage.setItem('t-theme',document.body.classList.contains('light')?'light':'dark');
}
if(localStorage.getItem('t-theme')==='light') document.body.classList.add('light');

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  lang = localStorage.getItem('t-lang')||'ar';
  document.documentElement.dir=I18N[lang]?I18N[lang].dir:'rtl';
  document.body.style.direction=I18N[lang]?I18N[lang].dir:'rtl';
  var sel=document.getElementById('lang-sel'); if(sel)sel.value=lang;
  buildNav();
  buildTickers();
  renderEco();
  // Update ticker labels
  var ls=document.getElementById('lbl-stocks'),lc=document.getElementById('lbl-crypto');
  if(ls)ls.textContent=L().lbl_s; if(lc)lc.textContent=L().lbl_c;
  var ll=document.getElementById('live-lbl'); if(ll)ll.textContent=L().live;
  var ft=document.getElementById('footer-txt'); if(ft)ft.textContent=L().footer;
});
</script>
